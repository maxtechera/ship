# Credentials registry — declarative index of the 30+ built-in checks.
#
# STATUS: documentation only in v0.1. The YAML loader that turns these entries
# into live checks lands in v0.3. For now, check definitions live in
# `scripts/check_local.py` and `scripts/check_all.py`; this file lists them so
# agents and tooling can discover what the skill covers without reading Python.
#
# Schema:
#   version: 1
#   checks:
#     - id: <stable identifier used by --only>
#       category: runtime-cli | cli-auth | api-token | cli-first | google-suite
#       detect:
#         cmd: [argv, ...]        # for runtime-cli / cli-auth
#         env: ENV_VAR            # for api-token / cli-first
#         token_file: .filename   # relative to $SHIP_CRED_DIR
#         whoami:
#           url: https://…
#           auth: "header:Bearer" | "query:access_token" | "header:X-Api-Key"
#       fix:
#         summary: "<short human hint>"
#         cmd: "<optional one-liner>"
#         template: "<printf-style; substitutes {cred_dir}>"

version: 1
checks:
  # ── Runtime CLIs ──
  - { id: git,       category: runtime-cli, detect: { cmd: [git, --version] } }
  - { id: node,      category: runtime-cli, detect: { cmd: [node, --version] } }
  - { id: pnpm,      category: runtime-cli, detect: { cmd: [pnpm, --version] } }
  - { id: python3,   category: runtime-cli, detect: { cmd: [python3, --version] } }

  # ── CLI Auth ──
  - { id: gh,            category: cli-auth, detect: { cmd: [gh, auth, status] }, fix: { cmd: "gh auth login" } }
  - { id: railway_cli,   category: cli-auth, detect: { cmd: [railway, whoami] },  fix: { cmd: "railway login" } }
  - { id: vercel_cli,    category: cli-auth, detect: { cmd: [vercel, whoami] },   fix: { cmd: "vercel login" } }
  - { id: linear_cli,    category: cli-auth, detect: { cmd: [linear, me] },       fix: { cmd: "linear auth login" } }
  - { id: supabase_cli,  category: cli-auth, detect: { cmd: [supabase, projects, list] }, fix: { cmd: "supabase login" } }
  - { id: render_cli,    category: cli-auth, detect: { cmd: [render, whoami] },   fix: { cmd: "render login" } }
  - { id: docker,        category: cli-auth, detect: { cmd: [docker, info] },     fix: { cmd: "open -a Docker" } }

  # ── API Tokens ──
  - { id: openai_token,     category: api-token, detect: { env: OPENAI_API_KEY,      token_file: .openai_token,      whoami: { url: "https://api.openai.com/v1/models",             auth: "header:Bearer" } } }
  - { id: anthropic_token,  category: api-token, detect: { env: ANTHROPIC_API_KEY,   token_file: .anthropic_token,   whoami: { url: "https://api.anthropic.com/v1/models",          auth: "header:x-api-key" } } }
  - { id: gemini_token,     category: api-token, detect: { env: GEMINI_API_KEY,      token_file: .gemini_token,      whoami: { url: "https://generativelanguage.googleapis.com/v1beta/models", auth: "query:key" } } }
  - { id: xai_token,        category: api-token, detect: { env: XAI_API_KEY,         token_file: .xai_token,         whoami: { url: "https://api.x.ai/v1/models",                   auth: "header:Bearer" } } }
  - { id: perplexity_token, category: api-token, detect: { env: PERPLEXITY_KEY,      token_file: .perplexity_token,  whoami: { url: "https://api.perplexity.ai/chat/completions",   auth: "header:Bearer" } } }
  - { id: meta_token,       category: api-token, detect: { env: META_ACCESS_TOKEN,   token_file: .meta_token,        whoami: { url: "https://graph.facebook.com/v21.0/me",          auth: "query:access_token" } } }
  - { id: manychat_token,   category: api-token, detect: { env: MANYCHAT_TOKEN,      token_file: .manychat_token,    whoami: { url: "https://api.manychat.com/fb/page/getInfo",     auth: "header:Bearer" } } }
  - { id: telegram_token,   category: api-token, detect: { env: TELEGRAM_BOT_TOKEN,  token_file: .telegram_bot_token, whoami: { url: "https://api.telegram.org/bot{token}/getMe",  auth: "none" } } }
  - { id: brave_token,      category: api-token, detect: { env: BRAVE_API_KEY,       token_file: .brave_token,       whoami: { url: "https://api.search.brave.com/res/v1/web/search", auth: "header:X-Subscription-Token" } } }
  - { id: zoom,             category: api-token, detect: { env: ZOOM_ACCESS_TOKEN,   token_file: .zoom_token,        whoami: { url: "https://api.zoom.us/v2/users/me",              auth: "header:Bearer" } } }

  # ── CLI-first ──
  - { id: twilio,     category: cli-first, detect: { cmd: [twilio, profiles:list] } }
  - { id: elevenlabs, category: cli-first, detect: { cmd: [elevenlabs, auth, whoami] } }
  - { id: mailerlite, category: cli-first, detect: { cmd: [mailerlite, account, list] } }
  - { id: posthog,    category: cli-first, detect: { cmd: [posthog-cli, query] } }

  # ── Google Suite (gog CLI manages OAuth) ──
  - { id: google_oauth, category: google-suite, detect: { cmd: [gog, auth, list] } }
  - { id: ga4,          category: google-suite, detect: { cmd: [gog, ga4, sessions, --days, "1"] } }
  - { id: gsc,          category: google-suite, detect: { cmd: [gog, gsc, sites] } }
  - { id: gcal,         category: google-suite, detect: { cmd: [gog, gcal, events, --date, today] } }
  - { id: gdrive,       category: google-suite, detect: { cmd: [gog, gdrive, whoami] } }
  - { id: gmail,        category: google-suite, detect: { cmd: [gog, gmail, profile] } }
  - { id: skool,        category: google-suite, detect: { cookie_file: cookies/skool-cookies.json, requires: gmail } }
