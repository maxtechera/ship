name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: |
          set -e
          for f in credentials/scripts/check_local.py credentials/scripts/check_all.py credentials/scripts/install.py credentials/scripts/refresh.py; do
            [ -f "$f" ] || { echo "skip: $f (not yet present)"; continue; }
            python3 -c "import ast, sys; ast.parse(open('$f').read()); print('ok: $f')"
          done

      - name: Bash syntax check
        run: |
          set -e
          for f in credentials/scripts/auth.sh; do
            [ -f "$f" ] || { echo "skip: $f (not yet present)"; continue; }
            bash -n "$f" && echo "ok: $f"
          done

      - name: Help output smoke
        run: |
          if [ -f credentials/scripts/check_local.py ]; then
            python3 credentials/scripts/check_local.py --help
          fi

      - name: No private-identifier leak in core code
        run: |
          set -e
          # /data/.clawdbot is a documented legacy fallback and is allowed.
          # Flag only user/workspace-specific identifiers that shouldn't be in
          # core opensource code.
          leak=$(grep -rnE '/Users/max/|lastrev|kumello|alphaclaw|theanswer|last-rev-llc' \
            --include='*.py' --include='*.sh' --include='*.md' --include='*.yml' \
            credentials/ 2>/dev/null || true)
          if [ -n "$leak" ]; then
            echo "FOUND private-identifier leak — move workspace-specific content to docs/extensions/:"
            echo "$leak"
            exit 1
          fi
